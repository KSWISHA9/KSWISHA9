- name: generate github-contribution-grid-snake.svg
  uses: Platane/snk/svg-only@v3
  with:
    github_user_name: ${{ github.repository_owner }}
    outputs: |
      dist/github-contribution-grid-snake.svg?color_snake=%23000000&color_dots=%23FFCCCC,%23FF6666,%23FF3333,%23CC0000,%238B0000
      dist/github-contribution-grid-snake-dark.svg?color_snake=%23000000&color_dots=%23FFCCCC,%23FF6666,%23FF3333,%23CC0000,%238B0000

